# yaml-language-server: $schema=../schemas/playbook.schema.json
# Basic Web Recon
# Standard reconnaissance — DNS, WHOIS, port scan, and basic HTTP/TLS checks.
# ⚠ Includes a port scan (nmap). Authorized targets only.

id: web-basic-recon
title: Basic Web Recon
description: Standard reconnaissance — DNS, WHOIS, port scan, and basic HTTP/TLS checks.
vars:
  target: fortmind.qa
  scheme: https
  topPorts: 1000
steps:
  - name: Resolve DNS A/AAAA
    uses: dns.resolve
    with:
      types: [A, AAAA, CNAME, NS, MX, TXT]
  - name: WHOIS
    uses: whois.lookup
  - name: Port scan (Nmap top ports)
    uses: nmap.scan
    with:
      flags: "-sV -Pn --top-ports {{vars.topPorts}}"
  - name: HTTP headers
    uses: http.headers
    with:
      path: /
      timeoutMs: 10000
  - name: robots.txt
    uses: http.get
    with:
      path: /robots.txt
      timeoutMs: 10000
  - name: TLS certificate info
    uses: tls.inspect
    with:
      port: 443
  - name: Passive subdomains (crt.sh)
    uses: subdomains.passive
    with:
      sources: [crtsh]
