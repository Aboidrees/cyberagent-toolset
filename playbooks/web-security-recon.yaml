# yaml-language-server: $schema=../schemas/playbook.schema.json
# Web Application Security Reconnaissance
# Security-focused assessment — exposed files, admin panels, framework leaks, and information disclosure.
# ⚠ For authorized security testing only. Ensure you have explicit permission to test the target.

id: web-security-recon
title: Web Application Security Reconnaissance
description: Security-focused assessment — exposed files, admin panels, framework leaks, and information disclosure.
vars:
  target: example.com
  scheme: https
  timeout: 10000
  userAgent: Mozilla/5.0 (compatible; SecurityBot/1.0)
steps:
  - name: Security Headers Check
    uses: http.headers
    with:
      path: /
      scheme: "{{vars.scheme}}"
      headers: {User-Agent: "{{vars.userAgent}}"}
      timeoutMs: "{{vars.timeout}}"
  - name: TLS Configuration Analysis
    uses: tls.inspect
    with:
      port: 443
      timeoutMs: 15000
  - name: .well-known/security.txt
    uses: http.get
    with:
      path: /.well-known/security.txt
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .env Files
    uses: http.get
    with:
      path: /.env
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .git Directory
    uses: http.get
    with:
      path: /.git/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .git/config
    uses: http.get
    with:
      path: /.git/config
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed Docker Files
    uses: http.get
    with:
      path: /Dockerfile
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .dockerignore
    uses: http.get
    with:
      path: /.dockerignore
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Web.config Exposure
    uses: http.get
    with:
      path: /web.config
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: .htaccess Exposure
    uses: http.get
    with:
      path: /.htaccess
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: phpinfo() Exposure
    uses: http.get
    with:
      path: /phpinfo.php
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Database Backup Files
    uses: http.get
    with:
      path: /backup.sql
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Site Backup Files
    uses: http.get
    with:
      path: /backup.zip
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Old Site Backup
    uses: http.get
    with:
      path: /old/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Admin Interface
    uses: http.get
    with:
      path: /admin/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Management Interface
    uses: http.get
    with:
      path: /manage/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Control Panel
    uses: http.get
    with:
      path: /cpanel/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: PHPMyAdmin
    uses: http.get
    with:
      path: /phpmyadmin/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: API Documentation
    uses: http.get
    with:
      path: /api/docs
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Swagger UI
    uses: http.get
    with:
      path: /swagger-ui/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: GraphQL Introspection
    uses: http.get
    with:
      path: /graphql
      scheme: "{{vars.scheme}}"
      headers: {Content-Type: application/json}
      timeoutMs: "{{vars.timeout}}"
  - name: Server Status
    uses: http.get
    with:
      path: /server-status
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Server Info
    uses: http.get
    with:
      path: /server-info
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: WordPress wp-config Backup
    uses: http.get
    with:
      path: /wp-config.php.bak
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: WordPress Debug Log
    uses: http.get
    with:
      path: /wp-content/debug.log
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Laravel .env
    uses: http.get
    with:
      path: /.env
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Django Settings
    uses: http.get
    with:
      path: /settings.py
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Error Logs
    uses: http.get
    with:
      path: /error.log
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Access Logs
    uses: http.get
    with:
      path: /access.log
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Source Maps
    uses: http.get
    with:
      path: /main.js.map
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Package.json
    uses: http.get
    with:
      path: /package.json
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Composer.json
    uses: http.get
    with:
      path: /composer.json
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .svn/entries
    uses: http.get
    with:
      path: /.svn/entries
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .hg (Mercurial)
    uses: http.get
    with:
      path: /.hg/store/00manifest.i
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Exposed .bzr (Bazaar)
    uses: http.get
    with:
      path: /.bzr/branch/branch.conf
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: AWS Credentials
    uses: http.get
    with:
      path: /.aws/credentials
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: NPM Token (.npmrc)
    uses: http.get
    with:
      path: /.npmrc
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: PyPI Token (.pypirc)
    uses: http.get
    with:
      path: /.pypirc
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: .env.local
    uses: http.get
    with:
      path: /.env.local
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: .env.production
    uses: http.get
    with:
      path: /.env.production
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: .env.backup
    uses: http.get
    with:
      path: /.env.backup
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: docker-compose.yml
    uses: http.get
    with:
      path: /docker-compose.yml
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: GitLab CI Config
    uses: http.get
    with:
      path: /.gitlab-ci.yml
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: GitHub Actions Workflow
    uses: http.get
    with:
      path: /.github/workflows/main.yml
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Actuator Health
    uses: http.get
    with:
      path: /actuator/health
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Actuator Env (secrets)
    uses: http.get
    with:
      path: /actuator/env
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: VS Code settings
    uses: http.get
    with:
      path: /.vscode/settings.json
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: JetBrains .idea
    uses: http.get
    with:
      path: /.idea/workspace.xml
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: macOS .DS_Store
    uses: http.get
    with:
      path: /.DS_Store
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: crossdomain.xml
    uses: http.get
    with:
      path: /crossdomain.xml
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: ASP.NET Trace (trace.axd)
    uses: http.get
    with:
      path: /trace.axd
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
