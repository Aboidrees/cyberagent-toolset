# yaml-language-server: $schema=../schemas/playbook.schema.json
# Email Security Assessment
# Email authentication posture — SPF, DMARC, DKIM, MTA-STS, and BIMI — via passive DNS lookups.

id: email-security-assessment
title: Email Security Assessment
description: Email authentication posture — SPF, DMARC, DKIM, MTA-STS, and BIMI — via passive DNS lookups.
vars:
  target: fortmind.qa
steps:
  - name: Email Security Posture
    uses: email.security
    with:
      selectors: [default, google, selector1, selector2, k1, mail]
      timeoutMs: 20000
  - name: Root TXT Records
    uses: dns.resolve
    with:
      types: [TXT]
      timeoutMs: 15000
  - name: MX Records
    uses: dns.resolve
    with:
      types: [MX]
      timeoutMs: 15000
