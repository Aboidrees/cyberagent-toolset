# yaml-language-server: $schema=../schemas/playbook.schema.json
# Comprehensive Web Reconnaissance
# Extensive reconnaissance — detailed DNS, infrastructure, security headers, and technology fingerprinting.
# ⚠ Includes active steps (nmap). Authorized targets only.

id: comprehensive-web-recon
title: Comprehensive Web Reconnaissance
description: Extensive reconnaissance — detailed DNS, infrastructure, security headers, and technology fingerprinting.
vars:
  target: fortmind.qa
  scheme: https
  topPorts: 1000
  fullPorts: false
  deepScan: true
  timeout: 15000
steps:
  - name: DNS A/AAAA Records
    uses: dns.resolve
    with:
      types: [A, AAAA]
      timeoutMs: 5000
  - name: DNS CNAME/Alias Records
    uses: dns.resolve
    with:
      types: [CNAME]
      timeoutMs: 5000
  - name: DNS MX/Mail Records
    uses: dns.resolve
    with:
      types: [MX]
      timeoutMs: 5000
  - name: DNS NS/Nameserver Records
    uses: dns.resolve
    with:
      types: [NS]
      timeoutMs: 5000
  - name: DNS TXT Records (SPF/DKIM/DMARC)
    uses: dns.resolve
    with:
      types: [TXT]
      timeoutMs: 5000
  - name: DNS PTR/Reverse Records
    uses: dns.resolve
    with:
      types: [PTR]
      timeoutMs: 5000
  - name: WHOIS Domain Registration Info
    uses: whois.lookup
    with:
      timeoutMs: 10000
  - name: Passive Subdomain Discovery (crt.sh)
    uses: subdomains.passive
    with:
      sources: [crtsh]
      timeoutMs: 20000
  - name: Top Ports Scan (Fast)
    uses: nmap.scan
    with:
      flags: "-sT -T4 --top-ports {{vars.topPorts}}"
      timeoutMs: 30000
  - name: Common Web Ports Scan
    uses: nmap.scan
    with:
      flags: "-sT -T4 -p 80,443,8080,8443,8000,8888,3000,5000,9000"
      timeoutMs: 15000
  - name: Service Version Detection
    uses: nmap.scan
    with:
      flags: "-sV -Pn -p 80,443,8080,8443"
      timeoutMs: 25000
  - name: HTTPS Headers Analysis
    uses: http.headers
    with:
      path: /
      scheme: https
      timeoutMs: "{{vars.timeout}}"
  - name: HTTP Headers Analysis (Fallback)
    uses: http.headers
    with:
      path: /
      scheme: http
      timeoutMs: "{{vars.timeout}}"
  - name: Security Headers Check
    uses: http.headers
    with:
      path: /
      scheme: "{{vars.scheme}}"
      headers: {User-Agent: Mozilla/5.0 (compatible; ReconBot/1.0)}
      timeoutMs: "{{vars.timeout}}"
  - name: robots.txt Discovery
    uses: http.get
    with:
      path: /robots.txt
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: sitemap.xml Discovery
    uses: http.get
    with:
      path: /sitemap.xml
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: humans.txt Discovery
    uses: http.get
    with:
      path: /humans.txt
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: security.txt Discovery
    uses: http.get
    with:
      path: /.well-known/security.txt
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: ads.txt Discovery
    uses: http.get
    with:
      path: /ads.txt
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Admin Panel Discovery
    uses: http.get
    with:
      path: /admin
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Login Page Discovery
    uses: http.get
    with:
      path: /login
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Config Files Discovery
    uses: http.get
    with:
      path: /config
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: API Endpoints Discovery
    uses: http.get
    with:
      path: /api
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: GraphQL Endpoint Discovery
    uses: http.get
    with:
      path: /graphql
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: .env File Discovery
    uses: http.get
    with:
      path: /.env
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: .git Directory Discovery
    uses: http.get
    with:
      path: /.git/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Backup Files Discovery
    uses: http.get
    with:
      path: /backup
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Debug Info Discovery
    uses: http.get
    with:
      path: /debug
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: TLS Certificate Analysis (443)
    uses: tls.inspect
    with:
      port: 443
      timeoutMs: 10000
  - name: TLS Certificate Analysis (8443)
    uses: tls.inspect
    with:
      port: 8443
      timeoutMs: 10000
  - name: Server Technology Headers
    uses: http.headers
    with:
      path: /
      scheme: "{{vars.scheme}}"
      headers: {Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8", Accept-Language: "en-US,en;q=0.5", Accept-Encoding: "gzip, deflate", DNT: "1", Connection: keep-alive, Upgrade-Insecure-Requests: "1"}
      timeoutMs: "{{vars.timeout}}"
  - name: 404 Error Page Analysis
    uses: http.get
    with:
      path: /nonexistent-page-404-test
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: 403 Forbidden Analysis
    uses: http.get
    with:
      path: /admin/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: WordPress Detection
    uses: http.get
    with:
      path: /wp-admin/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Drupal Detection
    uses: http.get
    with:
      path: /user/login
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: Joomla Detection
    uses: http.get
    with:
      path: /administrator/
      scheme: "{{vars.scheme}}"
      timeoutMs: "{{vars.timeout}}"
  - name: CloudFlare Detection
    uses: http.headers
    with:
      path: /
      scheme: "{{vars.scheme}}"
      headers: {CF-Connecting-IP: test}
      timeoutMs: "{{vars.timeout}}"
