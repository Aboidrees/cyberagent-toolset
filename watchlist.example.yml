# Target watchlist — run with:  node src/index.js watch --list watchlist.example.yml
#
# Each target lists the playbook ids to run against it (ids come from the YAML
# front-matter of the files in playbooks/, or `node src/index.js --help`).

# Optional vars applied to every run.
vars:
  scheme: https

targets:
  - host: cyberany.org
    playbooks: [quick-web-recon, web-headers-assessment]

  - host: api.cyberany.org
    playbooks: [api-cloud-recon, email-security-assessment]
    # Per-target var overrides are also supported:
    # vars:
    #   scheme: http
